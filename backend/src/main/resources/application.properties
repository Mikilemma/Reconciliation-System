spring.datasource.url=jdbc:mysql://localhost:3306/settlement
# spring.datasource.url=jdbc:mysql://10.1.25.50:3306/settlement
spring.datasource.username=root
spring.datasource.password=Test@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080
# server.port=8084

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Settlement Engine Configuration
settlement.engine.batch-size=1000
settlement.engine.timeout-minutes=30
settlement.engine.auto-reconcile=false

# Logging Configuration
logging.level.com.settlement.reconciliation=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Centralized CORS Configuration
app.cors.allowed-origins=http://10.1.25.50:5173,http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:8080,http://127.0.0.1:13133,http://127.0.0.1:3000,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
