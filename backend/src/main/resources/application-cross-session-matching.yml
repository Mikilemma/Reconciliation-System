# Cross-Session Matching Configuration
reconciliation:
  cross-session-matching:
    # Enable/disable cross-session matching
    enabled: true
    
    # Matching thresholds
    thresholds:
      exact-match: 100.0
      fuzzy-match: 85.0
      date-range-match: 75.0
      minimum-confidence: 70.0
    
    # Date range for fuzzy matching (in days)
    fuzzy-date-range-days: 7
    
    # Amount tolerance for fuzzy matching
    amount-tolerance: 0.01
    
    # Auto-approve high confidence matches
    auto-approve-high-confidence: true
    auto-approve-threshold: 95.0
    
    # Cleanup configuration
    cleanup:
      enabled: true
      resolved-transaction-retention-days: 90
      approved-match-retention-days: 90
      run-scheduled: true
      cron-expression: "0 0 2 * * ?"  # 2 AM daily
    
    # Performance settings
    performance:
      batch-size: 1000
      max-concurrent-matches: 10
      matching-timeout-ms: 30000  # 30 seconds
      enable-async-processing: true

# Database Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/settlement_reconciliation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  
  # Flyway migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Logging Configuration
logging:
  level:
    com.settlement.reconciliation: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cross-session-matching.log
    max-size: 10MB
    max-history: 30

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 20000
    max-connections: 8192

# File Upload Configuration
spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 100MB
  file-size-threshold: 2KB

# CORS Configuration
cors:
  allowed-origins: "http://localhost:3000,http://localhost:5173"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600
